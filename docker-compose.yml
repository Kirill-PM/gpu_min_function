version: '3.8'

services:
  master:
    build: ./master
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    networks:
      - gpu-net

  worker:
    build: ./worker
    environment:
      - MASTER_URL=http://master:8080
    depends_on:
      - master
    networks:
      - gpu-net
    # Для доступа к GPU на Windows нужен специальный драйвер
    # На Linux добавить: devices: [/dev/dri]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - master
    networks:
      - gpu-net

networks:
  gpu-net:
    driver: bridge